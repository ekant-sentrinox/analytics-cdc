# =============================================================================
# analytics-cdc configuration (HOCON / Typesafe Config).
#
# Loaded automatically from the classpath by ConfigFactory.load(). Both the
# ollylake init (ai.sentrinox.OllylakeSchemaInitializer) and the reference CDC
# job (ai.sentrinox.SccalReferenceSync) read the `analytics_cdc` block below.
# =============================================================================

analytics_cdc {

  # Root of the SCCAL internal-sync API (no trailing slash). Used by the CDC job
  # to build the change-stream requests:
  #   GET {base}/internal/sccal/api/v1/cursors   (which tenants advanced)
  #   GET {base}/internal/sccal/api/v1/changes   (a tenant's change entries)
  #   - host running the Spring server : http://localhost:8080
  #   - from WSL2                       : http://<windows-host-gateway>:8080
  #   - container on the Docker host    : http://host.docker.internal:8080
  # Overridable at runtime with the SCCAL_BASE_URL environment variable.
  sccal_base_url = "http://localhost:8080"
  sccal_base_url = ${?SCCAL_BASE_URL}

  # How often to re-run the capture. A positive duration (e.g. "1m", "30s",
  # "5 minutes") keeps the process alive and polls on that interval, reusing the
  # warm DuckDB connection between cycles. 0 = run once and exit (one-shot).
  # Overridable at runtime with the POLL_INTERVAL environment variable.
  poll_interval = 30s
  poll_interval = ${?POLL_INTERVAL}

  # SQL executed once on the DuckDB connection at startup — installs extensions,
  # configures the MinIO (S3) secret and ATTACHes the DuckLake catalog. Loaded by
  # io.dazzleduck.sql.common.StartupScriptProvider; the script file uses
  # ${ENV_VAR} placeholders that must be present in the environment
  # (MINIO_KEY_ID, MINIO_SECRET, MINIO_REGION, MINIO_ENDPOINT, MINIO_USE_SSL,
  # OLLYLAKE_BUCKET, PG_HOST, PG_PORT, PG_DB, PG_USER, PG_PASSWORD).
  #
  # The default points into the analytics-schema submodule (run
  # `git submodule update --init` after cloning). Override the location with the
  # STARTUP_SQL environment variable (e.g. a file mounted at /config/startup.sql
  # inside a container).
  startup_script_provider {
    script_location = "schema/ollylake/conf/connect.sql"
    script_location = ${?STARTUP_SQL}
  }

  # ---------------------------------------------------------------------------
  # The reference tables and how each is captured from the /changes stream.
  # Adding a table needs NO Java change: create the table (a new
  # ollylake/init/V*.sql migration in the analytics-schema repo) and declare
  # a block here.
  #
  # Per entry:
  #   entity_type   /changes entityType that feeds the table (the stream emits
  #                 enum names: USER, WORKSPACE, USERGROUP, RULE, ...). Several
  #                 entries may share one entity_type (see entry_filter).
  #   table         target table, schema-qualified; quote reserved words
  #                 ("user", "group").
  #   key_columns   identity columns — with customer_id (stamped from the poll
  #                 context, never declared here) they form the per-customer
  #                 CDC key.
  #   data_columns  non-key attribute columns; may be empty for edge tables.
  #   entry_filter  optional SQL predicate over the raw `entry` JSON, ANDed
  #                 with the entity_type match, to split one entityType across
  #                 several tables by payload content.
  #
  # Each column lists its json_fields most-specific first: the /changes stream
  # mixes two payload conventions — the real Sentrinox shape (userId, userName,
  # isDeleted / the USERGROUP payload's userGroupId, name) and a generic shape
  # (id, name, email) — and the capture coalesces them, taking the first
  # present.
  #
  # The stream only ever emits USER, WORKSPACE, USERGROUP and RULE entities for
  # these tables (GroupServiceImpl publishes USERGROUP for group CRUD — the
  # GROUP enum value itself is never published). RULE fans out to two tables by
  # its payload's ruleType: 0/1 is an LLM access rule, 2/3 an MCP one —
  # LlmPolicyService/McpPolicyService both publish plain RULE, so the split can
  # only be made on payload content (entry_filter), not on entity_type. The V6
  # global lookups (provider, model, mcp_server, mcp_tool) and tenant are fed
  # by the catalogue /list pull instead (catalogue_syncs below); vkey and
  # budget_rule have no source on either path and are left empty.
  # ---------------------------------------------------------------------------
  syncs = [
    {
      entity_type = "WORKSPACE"
      table = "ollylake.main.workspace"
      key_columns = [
        { column = "workspace_id", json_fields = ["workspaceId", "id"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["workspaceName", "name"], type = "VARCHAR" }
      ]
    }
    {
      entity_type = "USER"
      table = "ollylake.main.\"user\""
      key_columns = [
        { column = "user_id", json_fields = ["userId", "id"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["userName", "email"], type = "VARCHAR" }
      ]
    }
    {
      entity_type = "USERGROUP"
      table = "ollylake.main.\"group\""
      key_columns = [
        { column = "group_id", json_fields = ["userGroupId", "groupId", "id"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["groupName", "name"], type = "VARCHAR" }
      ]
    }
    {
      entity_type = "RULE"
      table = "ollylake.main.llm_access_rule"
      key_columns = [
        { column = "llm_access_rule_id", json_fields = ["ruleId", "id"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["name"], type = "VARCHAR" }
      ]
      entry_filter = "TRY_CAST(entry->'sccal'->>'ruleType' AS INT) IN (0, 1)"
    }
    {
      entity_type = "RULE"
      table = "ollylake.main.mcp_access_rule"
      key_columns = [
        { column = "mcp_access_rule_id", json_fields = ["ruleId", "id"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["name"], type = "VARCHAR" }
      ]
      entry_filter = "TRY_CAST(entry->'sccal'->>'ruleType' AS INT) IN (2, 3)"
    }
  ]

  # ---------------------------------------------------------------------------
  # Global-tier capture: the catalogue dimensions (providers, models, MCP
  # servers/tools) plus tenant, pulled from GET {base}/internal/sccal/api/v1/
  # {object_type}/list. The global catalog is deliberately NOT in the change
  # stream (it only changes when a global migration lands upstream — see the
  # admin layer's global-catalog-sync.md); it syncs by full snapshot on first
  # contact, then `updatedSince` incremental deltas with isDeleted tombstones,
  # gated by the globalCatalog.schemaRevision value embedded in /cursors pages.
  #
  # Entries apply in declaration order — keep referenced-before-referencing
  # (FK) order: providers before models, MCP servers before tools.
  #
  # Per entry (same column grammar as `syncs` above):
  #   object_type   /list path segment (lowercase, as the API spells it).
  #   table         target table, schema-qualified.
  #   key_columns   identity columns; NULL/malformed keys are skipped.
  #   data_columns  attribute columns; a non-tombstone row missing any
  #                 declared column is skipped with a warning (the V6 targets
  #                 declare them NOT NULL), same as the stream path.
  #   per_tenant    true for tenant: its /list answers one row per
  #                 (customerId, tenantId) pair, so it is pulled per pair
  #                 known to the change stream and stamped with customer_id;
  #                 global types are pulled once with catalogue_context below.
  #
  # The targets are the V6 global lookups (provider, model, mcp_server,
  # mcp_tool) plus the per-customer tenant — id + name (+ the parent-id join
  # key for model/mcp_tool), per the V6 philosophy: richer attributes stay in
  # the source of truth.
  # ---------------------------------------------------------------------------
  catalogue_syncs = [
    {
      object_type = "providercatalogue"
      table = "ollylake.main.provider"
      key_columns = [
        { column = "provider_id", json_fields = ["providerCatalogueId"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["name"], type = "VARCHAR" }
      ]
    }
    {
      object_type = "modelcatalogue"
      table = "ollylake.main.model"
      key_columns = [
        { column = "model_id", json_fields = ["modelCatalogueId"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["name"], type = "VARCHAR" }
        { column = "provider_id", json_fields = ["providerCatalogueId"], type = "BIGINT" }
      ]
    }
    {
      object_type = "mcpservercatalogue"
      table = "ollylake.main.mcp_server"
      key_columns = [
        { column = "mcp_server_id", json_fields = ["mcpServerCatalogueId"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["name"], type = "VARCHAR" }
      ]
    }
    {
      object_type = "mcptoolcatalogue"
      table = "ollylake.main.mcp_tool"
      key_columns = [
        { column = "mcp_tool_id", json_fields = ["mcpToolCatalogueId"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["name"], type = "VARCHAR" }
        { column = "mcp_server_id", json_fields = ["mcpServerCatalogueId"], type = "BIGINT" }
      ]
    }
    {
      object_type = "tenant"
      table = "ollylake.main.tenant"
      per_tenant = true
      key_columns = [
        { column = "tenant_id", json_fields = ["tenantId"], type = "BIGINT" }
      ]
      data_columns = [
        { column = "name", json_fields = ["name"], type = "VARCHAR" }
      ]
    }
  ]

  # customerId/tenantId sent on the GLOBAL catalogue /list pulls. Both params
  # are required by the endpoint but inert for global catalogue types (their
  # queries hit the shared `global.*` schema regardless of routing), so any
  # valid value works. The per-tenant sync ignores this and uses each pair's
  # own ids. Overridable at runtime with the CATALOGUE_CUSTOMER_ID /
  # CATALOGUE_TENANT_ID environment variables.
  catalogue_context {
    customer_id = "1"
    customer_id = ${?CATALOGUE_CUSTOMER_ID}
    tenant_id = "1"
    tenant_id = ${?CATALOGUE_TENANT_ID}
  }
}
