# =============================================================================
# analytics-cdc configuration (HOCON / Typesafe Config).
#
# Loaded automatically from the classpath by ConfigFactory.load(). Both the
# ollylake init (ai.sentrinox.OllylakeSchemaInitializer) and the reference CDC
# job (ai.sentrinox.SccalReferenceSync) read the `analytics_cdc` block below.
# =============================================================================

analytics_cdc {

  # Root of the SCCAL internal-sync API (no trailing slash). Used by the CDC job
  # to build  GET {base}/internal/sccal/api/v1/{objectType}/list  requests.
  #   - host running the Spring server : http://localhost:8080
  #   - from WSL2                       : http://<windows-host-gateway>:8080
  #   - container on the Docker host    : http://host.docker.internal:8080
  # Overridable at runtime with the SCCAL_BASE_URL environment variable.
  sccal_base_url = "http://localhost:8080"
  sccal_base_url = ${?SCCAL_BASE_URL}

  # How often to re-run the capture. 0 (default) = run once and exit (one-shot).
  # A positive duration (e.g. "30s", "5 minutes") keeps the process alive and
  # polls on that interval, reusing the warm DuckDB connection between cycles.
  # Overridable at runtime with the POLL_INTERVAL environment variable.
  poll_interval = 0
  poll_interval = ${?POLL_INTERVAL}

  # SQL executed once on the DuckDB connection at startup — installs extensions,
  # configures the MinIO (S3) secret and ATTACHes the DuckLake catalog. Loaded by
  # io.dazzleduck.sql.common.StartupScriptProvider; the script file uses
  # ${ENV_VAR} placeholders that must be present in the environment.
  #
  # Override the location with the STARTUP_SQL environment variable (e.g. a file
  # mounted at /config/startup.sql inside a container).
  startup_script_provider {
    script_location = "ollylake/startup.sql"
    script_location = ${?STARTUP_SQL}
  }
}
