services:
  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store that backs the DuckLake data files.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: ollylake-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data

  # ---------------------------------------------------------------------------
  # metadata-db — PostgreSQL that holds the DuckLake catalog metadata (the
  # snapshot / table / schema bookkeeping that previously lived in the local
  # .ducklake file). Data files still go to MinIO; only the metadata moves here.
  # ---------------------------------------------------------------------------
  metadata-db:
    image: postgres:18
    container_name: ollylake-metadata-db
    environment:
      POSTGRES_USER: ${METADATA_DB_USER:-ollylake}
      POSTGRES_PASSWORD: ${METADATA_DB_PASSWORD:-ollylake}
      POSTGRES_DB: ${METADATA_DB_NAME:-ollylake_catalog}
    # Host port is only for external tools (DuckDB/psql on the host); containers
    # reach this DB over the Docker network as metadata-db:5432. Remapped to 5433
    # to avoid clashing with another Postgres already bound to host 5432.
    ports:
      - "${METADATA_DB_HOST_PORT:-5433}:5432"
    # postgres:18+ stores data in a major-version subdir and wants the volume at
    # /var/lib/postgresql (not .../data) — see docker-library/postgres#1259.
    volumes:
      - metadata-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METADATA_DB_USER:-ollylake} -d ${METADATA_DB_NAME:-ollylake_catalog}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # minio-init — uses the MinIO client (mc) to create the bucket that holds the
  # DuckLake warehouse. mc cannot run SQL, so it only provisions the bucket.
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: ollylake-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BUCKET: ${OLLYLAKE_BUCKET:-ollylake-cdc}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio..."; sleep 2;
        done
        mc mb --ignore-existing "local/$$BUCKET"
        echo "bucket '$$BUCKET' ready"

  # ---------------------------------------------------------------------------
  # ollylake-init — Java program (DuckDB JDBC, org.duckdb:duckdb_jdbc:1.4.5)
  # that ATTACHes a DuckLake catalog named 'ollylake' (data files -> MinIO,
  # metadata -> the PostgreSQL metadata-db) and runs every SQL file in the
  # analytics-schema repo's ollylake/init to create the tables (the CDC
  # migrations merged into that chain; set OLLYLAKE_INIT_DIR if the checkout
  # is not a sibling of this repo).
  # ---------------------------------------------------------------------------
  ollylake-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollylake-init
    depends_on:
      minio-init:
        condition: service_completed_successfully
      metadata-db:
        condition: service_healthy
    environment:
      STARTUP_SQL: /config/startup.sql      # consumed by StartupScriptProvider
      # ${VAR} placeholders in schema/ollylake/conf/connect.sql — all must be
      # set. MinIO credentials/endpoint mirror the minio service, PG_* mirror
      # the metadata-db service (container port 5432, not the remapped host
      # port).
      MINIO_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      OLLYLAKE_BUCKET: ${OLLYLAKE_BUCKET:-ollylake-cdc}
      PG_HOST: ${METADATA_DB_HOST:-metadata-db}
      PG_PORT: ${METADATA_DB_PORT:-5432}
      PG_DB: ${METADATA_DB_NAME:-ollylake_catalog}
      PG_USER: ${METADATA_DB_USER:-ollylake}
      PG_PASSWORD: ${METADATA_DB_PASSWORD:-ollylake}
    volumes:
      - ${OLLYLAKE_INIT_DIR:-./schema/ollylake/init}:/init:ro   # SQL files from the analytics-schema submodule
      - ./schema/ollylake/conf/connect.sql:/config/startup.sql:ro
      # Persist DuckDB's downloaded extensions (ducklake/httpfs/postgres_scanner/
      # arrow) so they are fetched only once, not on every recreate.
      - duckdb-ext:/root/.duckdb

  # ---------------------------------------------------------------------------
  # analytics-cdc — Java program (ai.sentrinox.SccalReferenceSync) that discovers
  # the (customerId, tenantId) pairs from the SCCAL cursor registry (/cursors)
  # and captures each pair's entity-change stream (insert / update / delete)
  # into the V6 reference tables. Runs after the tables have been created by
  # ollylake-init.
  # ---------------------------------------------------------------------------
  analytics-cdc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-cdc
    depends_on:
      ollylake-init:
        condition: service_completed_successfully
      metadata-db:
        condition: service_healthy
    # Reach the SCCAL Spring server running on the Docker host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      STARTUP_SQL: /config/startup.sql      # consumed by StartupScriptProvider
      # ${VAR} placeholders in schema/ollylake/conf/connect.sql — all must be
      # set. MinIO credentials/endpoint mirror the minio service, PG_* mirror
      # the metadata-db service (container port 5432, not the remapped host
      # port).
      MINIO_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      OLLYLAKE_BUCKET: ${OLLYLAKE_BUCKET:-ollylake-cdc}
      PG_HOST: ${METADATA_DB_HOST:-metadata-db}
      PG_PORT: ${METADATA_DB_PORT:-5432}
      PG_DB: ${METADATA_DB_NAME:-ollylake_catalog}
      PG_USER: ${METADATA_DB_USER:-ollylake}
      PG_PASSWORD: ${METADATA_DB_PASSWORD:-ollylake}
      # Overrides sccal_base_url in application.conf.
      SCCAL_BASE_URL: ${SCCAL_BASE_URL:-http://host.docker.internal:8080}
      # Poll continuously (e.g. 30s, 1m, "5 minutes"); 0 = run once and exit.
      POLL_INTERVAL: ${POLL_INTERVAL:-30s}
    entrypoint: ["java", "-cp", "/app/app.jar", "ai.sentrinox.SccalReferenceSync"]
    volumes:
      - ./schema/ollylake/conf/connect.sql:/config/startup.sql:ro
      # Share the same DuckDB extension cache as ollylake-init.
      - duckdb-ext:/root/.duckdb

volumes:
  minio-data:
  metadata-db-data:
  duckdb-ext:
