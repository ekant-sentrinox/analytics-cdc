services:
  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store that backs the DuckLake data files.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: ollylake-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data

  # ---------------------------------------------------------------------------
  # minio-init — uses the MinIO client (mc) to create the bucket that holds the
  # DuckLake warehouse. mc cannot run SQL, so it only provisions the bucket.
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: ollylake-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BUCKET: ${OLLYLAKE_BUCKET:-ollylake}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio..."; sleep 2;
        done
        mc mb --ignore-existing "local/$$BUCKET"
        echo "bucket '$$BUCKET' ready"

  # ---------------------------------------------------------------------------
  # ollylake-init — Java program (DuckDB JDBC, org.duckdb:duckdb_jdbc:1.4.5)
  # that ATTACHes a DuckLake catalog named 'ollylake' (data files -> MinIO,
  # metadata -> persisted .ducklake file) and runs every SQL file in
  # ./ollylake/init to create the tables.
  # ---------------------------------------------------------------------------
  ollylake-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollylake-init
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      OLLYLAKE_BUCKET: ${OLLYLAKE_BUCKET:-ollylake}
      CATALOG_PATH: ${CATALOG_PATH:-/catalog/ollylake.ducklake}
      STARTUP_SQL: /config/startup.sql      # consumed by StartupScriptProvider
    volumes:
      - ./ollylake/init:/init:ro            # SQL files, editable without rebuild
      - ./ollylake/startup.sql:/config/startup.sql:ro
      - ollylake-catalog:/catalog          # DuckLake metadata, persisted

  # ---------------------------------------------------------------------------
  # analytics-cdc — Java program (ai.sentrinox.ReferenceCdc) that reads the
  # (customerId, tenantId) pairs from customer_tenant_reference, calls the SCCAL
  # internal-sync API for each reference object type and captures the changes
  # (insert / update / delete) into the V6 reference tables. Runs after the
  # tables have been created by ollylake-init.
  # ---------------------------------------------------------------------------
  analytics-cdc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-cdc
    depends_on:
      ollylake-init:
        condition: service_completed_successfully
    # Reach the SCCAL Spring server running on the Docker host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      OLLYLAKE_BUCKET: ${OLLYLAKE_BUCKET:-ollylake}
      CATALOG_PATH: ${CATALOG_PATH:-/catalog/ollylake.ducklake}
      STARTUP_SQL: /config/startup.sql      # consumed by StartupScriptProvider
      # Overrides sccal_base_url in application.conf.
      SCCAL_BASE_URL: ${SCCAL_BASE_URL:-http://host.docker.internal:8080}
      # 0 = one-shot (default); set e.g. 30s or "5 minutes" to poll continuously.
      POLL_INTERVAL: ${POLL_INTERVAL:-0}
    entrypoint: ["java", "-cp", "/app/app.jar", "ai.sentrinox.SccalReferenceSync"]
    volumes:
      - ./ollylake/startup.sql:/config/startup.sql:ro
      - ollylake-catalog:/catalog

volumes:
  minio-data:
  ollylake-catalog:
